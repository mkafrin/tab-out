<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tab Out</title>

  <link rel="stylesheet" href="newtab.css">
</head>
<body>
<div class="container">

  <!-- ================================================================
       HEADER — greeting on the left
       ================================================================ -->
  <header>
    <div class="header-left">
      <!-- "Good afternoon" — written by getGreeting() in newtab.js -->
      <h1 id="greeting"></h1>
      <!-- "Friday, April 4, 2026" — written by getDateDisplay() in newtab.js -->
      <div class="date" id="dateDisplay"></div>
    </div>
    <div class="header-right">
      <div class="search-wrapper">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="search-icon">
          <path stroke-linecap="round" stroke-linejoin="round" d="m21 21-5.197-5.197m0 0A7.5 7.5 0 1 0 5.196 5.196a7.5 7.5 0 0 0 10.607 10.607Z" />
        </svg>
        <input type="search" id="tabSearch" placeholder="Search tabs, domains, urls..." autocomplete="off">
      </div>
    </div>
  </header>

  <!-- ================================================================
       TAB OUT DUPES BANNER — appears when you have extra Tab Out tabs open
       Hidden by default; newtab.js shows it when dupeTabOutCount > 1
       ================================================================ -->
  <div class="tab-cleanup-banner" id="tabOutDupeBanner" style="display:none">
    <div class="tab-cleanup-left">
      <div class="tab-cleanup-icon">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 17.25v3.375c0 .621-.504 1.125-1.125 1.125h-9.75a1.125 1.125 0 0 1-1.125-1.125V7.875c0-.621.504-1.125 1.125-1.125H6.75a9.06 9.06 0 0 1 1.5.124m7.5 10.376h3.375c.621 0 1.125-.504 1.125-1.125V11.25c0-4.46-3.243-8.161-7.5-8.876a9.06 9.06 0 0 0-1.5-.124H9.375c-.621 0-1.125.504-1.125 1.125v3.5m7.5 10.375H9.375a1.125 1.125 0 0 1-1.125-1.125v-9.25m12 6.625v-1.875a3.375 3.375 0 0 0-3.375-3.375h-1.5a1.125 1.125 0 0 1-1.125-1.125v-1.5a3.375 3.375 0 0 0-3.375-3.375H9.75" />
        </svg>
      </div>
      <div class="tab-cleanup-text">
        You have <strong id="tabOutDupeCount"></strong> Tab Out tabs open. Keep just this one?
      </div>
    </div>
    <button class="tab-cleanup-btn" data-action="close-tabout-dupes">Close extras</button>
  </div>

  <!-- ================================================================
       MAIN CONTENT AREA — two-column layout
       Left: open tabs (domain/mission cards)
       Right: saved for later checklist
       The right column only renders when it has items (JS controls this)
       ================================================================ -->
  <div class="dashboard-columns" id="dashboardColumns">

    <!-- LEFT COLUMN: Open tabs -->
    <div class="active-section" id="openTabsSection" style="display:none">
      <div class="section-header">
        <h2 id="openTabsSectionTitle">Right now</h2>
        <div class="section-line"></div>
        <div class="section-count" id="openTabsSectionCount"></div>
      </div>
      <div class="missions" id="openTabsMissions"></div>
    </div>

    <!-- RIGHT COLUMN: Saved for Later checklist -->
    <div class="deferred-column" id="deferredColumn" style="display:none">
      <button class="column-toggle" id="columnToggle" title="Minimize">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" d="m8.25 4.5 7.5 7.5-7.5 7.5" />
        </svg>
      </button>
      <div class="deferred-scroll-wrapper">
        <div class="section-header">
          <h2>Saved for later</h2>
          <div class="section-line"></div>
          <div class="section-count" id="deferredCount"></div>
        </div>

        <!-- Active checklist items — injected by renderDeferredList() in newtab.js -->
        <div class="deferred-list" id="deferredList"></div>

        <!-- Empty state — shown when no active deferred tabs -->
        <div class="deferred-empty" id="deferredEmpty" style="display:none">
          Nothing saved. Living in the moment.
        </div>

        <!-- Archive section — collapsed by default -->
        <div class="deferred-archive" id="deferredArchive" style="display:none">
          <button class="archive-toggle" id="archiveToggle">
            <svg class="archive-chevron" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="m19.5 8.25-7.5 7.5-7.5-7.5" /></svg>
            Archive
            <span class="archive-count" id="archiveCount"></span>
          </button>
          <div class="archive-body" id="archiveBody" style="display:none">
            <input type="text" class="archive-search" id="archiveSearch" placeholder="Search archived tabs...">
            <div class="archive-list" id="archiveList"></div>
          </div>
        </div>
      </div><!-- end .deferred-scroll-wrapper -->
    </div>

  </div><!-- end .dashboard-columns -->

  <!-- ================================================================
       FOOTER — global stats + refresh control
       ================================================================ -->
  <footer>
    <div class="footer-stats">
      <div class="stat">
        <div class="stat-num" id="statTabs">—</div>
        <div class="stat-label">Open tabs</div>
      </div>
    </div>
    <div class="last-refresh">
      <button class="settings-btn" id="openColorPanel" title="Customize colors">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" d="M9.594 3.94c.09-.542.56-.94 1.11-.94h2.593c.55 0 1.02.398 1.11.94l.213 1.281c.063.374.313.686.645.87.074.04.147.083.22.127.325.196.72.257 1.075.124l1.217-.456a1.125 1.125 0 0 1 1.37.49l1.296 2.247a1.125 1.125 0 0 1-.26 1.431l-1.003.827c-.293.241-.438.613-.43.992a7.723 7.723 0 0 1 0 .255c-.008.378.137.75.43.991l1.004.827c.424.35.534.955.26 1.43l-1.298 2.248a1.125 1.125 0 0 1-1.369.491l-1.217-.456c-.355-.133-.75-.072-1.076.124a6.47 6.47 0 0 1-.22.128c-.331.183-.581.495-.644.869l-.213 1.281c-.09.543-.56.94-1.11.94h-2.594c-.55 0-1.019-.398-1.11-.94l-.213-1.281c-.062-.374-.312-.686-.644-.87a6.52 6.52 0 0 1-.22-.127c-.325-.196-.72-.257-1.076-.124l-1.217.456a1.125 1.125 0 0 1-1.369-.49l-1.297-2.247a1.125 1.125 0 0 1 .26-1.431l1.004-.827c.292-.24.437-.613.43-.991a6.932 6.932 0 0 1 0-.255c.007-.38-.138-.751-.43-.992l-1.004-.827a1.125 1.125 0 0 1-.26-1.43l1.297-2.247a1.125 1.125 0 0 1 1.37-.491l1.216.456c.356.133.751.072 1.076-.124.072-.044.146-.086.22-.128.332-.183.582-.495.644-.869l.214-1.28Z" />
          <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 1 1-6 0 3 3 0 0 1 6 0Z" />
        </svg>
      </button>
      <span style="color: var(--muted); font-size: 11px;"><a href="https://github.com/zarazhangrui/tab-out" target="_blank" style="color: var(--muted); text-decoration: underline; text-underline-offset: 2px;">Tab Out</a> by <a href="https://x.com/zarazhangrui" target="_blank" style="color: var(--muted); text-decoration: underline; text-underline-offset: 2px;">Zara</a></span>
    </div>
  </footer>

</div><!-- end .container -->

<!-- ================================================================
     TOAST — floats above everything, used for action confirmations
     Hidden by default via CSS (opacity:0, translateY)
     ================================================================ -->
<div class="toast" id="toast">
  <!-- Checkmark circle icon (Heroicons outline) -->
  <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
    <path stroke-linecap="round" stroke-linejoin="round" d="M9 12.75 11.25 15 15 9.75M21 12a9 9 0 1 1-18 0 9 9 0 0 1 18 0Z" />
  </svg>
  <span id="toastText"></span>
</div>

  <!-- Confirmation Modal -->
  <div class="modal-overlay" id="confirmModal">
    <div class="modal-card">
      <h3 id="modalTitle">Are you sure?</h3>
      <p id="modalDescription">This will close all open tabs in this group.</p>
      <div class="modal-actions">
        <button class="modal-btn secondary" id="modalCancel">Cancel</button>
        <button class="modal-btn danger" id="modalConfirm">Close tabs</button>
      </div>
    </div>
  </div>

  <!-- Color Picker Panel -->
  <div class="modal-overlay" id="colorPanelModal">
    <div class="modal-card color-panel">
      <h3>Customize colors</h3>
      <div class="color-rows" id="colorRows">
        <label class="color-row">
          <span class="color-label">Background</span>
          <input type="color" class="color-swatch" data-color-key="paper">
          <input type="text" class="color-hex" data-color-key="paper" maxlength="7" placeholder="#f8f5f0">
        </label>
        <label class="color-row">
          <span class="color-label">Text</span>
          <input type="color" class="color-swatch" data-color-key="ink">
          <input type="text" class="color-hex" data-color-key="ink" maxlength="7" placeholder="#1a1613">
        </label>
        <label class="color-row">
          <span class="color-label">Accent</span>
          <input type="color" class="color-swatch" data-color-key="amber">
          <input type="text" class="color-hex" data-color-key="amber" maxlength="7" placeholder="#c8713a">
        </label>
        <label class="color-row">
          <span class="color-label">Success</span>
          <input type="color" class="color-swatch" data-color-key="sage">
          <input type="text" class="color-hex" data-color-key="sage" maxlength="7" placeholder="#5a7a62">
        </label>
        <label class="color-row">
          <span class="color-label">Danger</span>
          <input type="color" class="color-swatch" data-color-key="rose">
          <input type="text" class="color-hex" data-color-key="rose" maxlength="7" placeholder="#b35a5a">
        </label>
      </div>
      <div class="color-panel-footer">
        <button class="color-reset" id="colorReset">Reset to defaults</button>
        <button class="modal-btn secondary" id="colorDone">Done</button>
      </div>
    </div>
  </div>

  <!-- Main dashboard logic — loads last so the DOM is ready -->
  <script src="newtab.js"></script>
</body>
</html>
